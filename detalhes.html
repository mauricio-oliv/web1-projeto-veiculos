<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Veículos</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>Portal de Veículos</h1>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="cadastro.html">Cadastro</a>
        <a href="login.html">Login</a>
    </nav>

    <main>
        <section class="detalhes-veiculo">
            <h2>Marca - Modelo (2020)</h2>
            <img src="https://placehold.co/400x250?text=Foto+do+Veiculo" alt="Foto do veículo" style="max-width: 400px;">
            <p><strong>Cidade:</strong> Uberlândia</p>
            <p><strong>Preço:</strong> R$ 50.000,00</p>
            <p><strong>Descrição:</strong> Veículo em ótimo estado de conservação.</p>
        </section>

        <section class="formulario">
            <h3>Tenho Interesse</h3>
            <form action="#" method="POST">
                <label>Nome:</label>
                <input type="text" name="nome" required>
                
                <label>Telefone:</label>
                <input type="tel" name="telefone" required>
                
                <label>Mensagem:</label>
                <textarea name="mensagem" required></textarea>
                
                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Portal de Veículos</p>
        <p>
            <a href="https://jigsaw.w3.org/css-validator/check/referer">
                <img style="border:0;width:88px;height:31px"
                    src="https://jigsaw.w3.org/css-validator/images/vcss-blue"
                    alt="CSS válido!" />
            </a>
        </p>
    </footer>
</body>
</html>
